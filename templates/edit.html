{% extends 'template.html' %}

{% block head %}
<title>Edit Ticket</title>
{% endblock %}

{% block body %}
<div class="container">

    <div class="banner">
        <h1>Support Tickets</h1>
    </div>

    <div class="form-holder">
        <h2 style="color: #cc0000;">{{ error }}</h2>

        <form action="/edit/{{ ticket.id }}" method="POST">
            <h3>Edit Ticket #{{ ticket.id }}</h3>
            <hr>
            &nbsp;
            <div class="row">
                <label for="title">Title <span class="red">*</span></label>
                <input id="title" type="text" name="title" value="{{ ticket.title }}" required />
            </div>
            <div class="row">
                <label for="description">Description <span class="red">*</span></label>
                <input id="description" type="text" name="description" value="{{ ticket.description }}" required />
            </div>
            <div class="row">
                <label for="category">Category <span class="red">*</span></label>
                <select id="category" name="category" required>
                    {% for cat in ['Bug', 'Feature Request', 'Access', 'Hardware', 'Other'] %}
                    <option value="{{ cat }}" {% if ticket.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <label for="priority">Priority <span class="red">*</span></label>
                <select id="priority" name="priority" required>
                    {% for p in ['Low', 'Medium', 'High'] %}
                    <option value="{{ p }}" {% if ticket.priority == p %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <label for="status">Status <span class="red">*</span></label>
                <select id="status" name="status" required>
                    {% for s in ['Open', 'In Progress', 'Closed'] %}
                    <option value="{{ s }}" {% if ticket.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <label for="assignee">Assignee <span class="red">*</span></label>
                <input id="assignee" type="text" name="assignee" value="{{ ticket.assignee }}" required />
            </div>
            <div class="btn-block">
                <a href="/" class="back-btn">Back to home</a>
                <input type="submit" value="Save changes">
            </div>
        </form>
    </div>

</div>
{% endblock %}
